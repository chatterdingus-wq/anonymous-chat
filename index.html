<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Chat Room</title>
<style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; }
    #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; background: #f9f9f9; margin-bottom: 10px; }
    #message { width: 70%; padding: 5px; margin-bottom: 5px; }
    button { padding: 5px 10px; }
    .msg { margin-bottom: 5px; }
    #consoleInput { width: 70%; padding: 5px; margin-top: 10px; }
</style>
</head>
<body>

<h1>Anonymous Chat Room</h1>
<div id="chat"></div>
<input type="text" id="message" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>

<h2>Console</h2>
<input type="text" id="consoleInput" placeholder="Enter command..." />
<button onclick="runCommand()">Run</button>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.3.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.3.0/firebase-database-compat.js"></script>
<script>
  // 🔹 Your Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyDsC5GGUEWzBagQhiEgIet96fRyqElIgWw",
    authDomain: "anonymouschatters-86252.firebaseapp.com",
    databaseURL: "https://anonymouschatters-86252-default-rtdb.firebaseio.com",
    projectId: "anonymouschatters-86252",
    storageBucket: "anonymouschatters-86252.firebasestorage.app",
    messagingSenderId: "108101708489",
    appId: "1:108101708489:web:c564c231a80391409bfb18",
    measurementId: "G-KVWSMMZJ8C"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const chatRef = db.ref('messages');

  const chatDiv = document.getElementById('chat');
  const messageInput = document.getElementById('message');
  const consoleInput = document.getElementById('consoleInput');

  // 🔹 One-time username
  let userName = localStorage.getItem('chatName');
  if (!userName) {
    userName = prompt("Choose your chat name (will be remembered on this browser):") || "Anonymous";
    localStorage.setItem('chatName', userName);
  }

  // 🔹 Listen for messages
  chatRef.on('child_added', (snapshot) => {
    const data = snapshot.val();
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = `${data.name}: ${data.text}`;
    chatDiv.appendChild(msg);
    chatDiv.scrollTop = chatDiv.scrollHeight;
  });

  // 🔹 Send message
  function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    // Secret wipe command (only you know)
    if (text === 'wipe1') {
      runCommand(); // Trigger wipe via console logic
      messageInput.value = '';
      return;
    }

    chatRef.push({ name: userName, text });
    messageInput.value = '';
  }

  messageInput.addEventListener('keyup', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  // 🔹 Run secret console commands
  function runCommand() {
    const cmd = consoleInput.value.trim();

    if (cmd === 'wipe1') {
      if (confirm("Are you sure you want to wipe all chat messages?")) {
        chatRef.remove()
          .then(() => {
            chatDiv.innerHTML = ''; // Clear chat locally
            console.log("All messages wiped!");
          })
          .catch(err => console.error(err));
      }
    }

    consoleInput.value = '';
  }

  consoleInput.addEventListener('keyup', (e) => {
    if (e.key === 'Enter') runCommand();
  });
</script>

</body>
</html>
