<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Chat + Vtipná reklama</title>
<style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; }
    #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; background: #f9f9f9; margin-bottom: 10px; }
    #message { width: 70%; padding: 5px; margin-bottom: 5px; }
    button { padding: 5px 10px; }
    .msg { margin-bottom: 5px; }

    /* Vtipná reklama */
    #funAd {
        border: 2px solid #ff6600;
        background: #fff8e1;
        text-align: center;
        padding: 10px;
        margin-top: 15px;
        font-weight: bold;
        font-size: 18px;
        color: #cc3300;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        border-radius: 10px;
    }

    #funAd img {
        height: 50px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    #funAd a {
        text-decoration: none;
        color: #cc3300;
    }

    #funAd a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<h1>Anonymous Chat Room</h1>

<div id="chatContainer">
  <div id="chat"></div>
  <input type="text" id="message" placeholder="Napiš zprávu..." />
  <button id="sendBtn">Odeslat</button>
</div>

<!-- Vtipná reklama -->
<div id="funAd">
  <a href="#" target="_blank">
    <img id="adImage" src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Uranium_disks.jpg/320px-Uranium_disks.jpg" alt="Jaderný materiál" />
    <span id="adText">Kupte si Uranijum!</span>
  </a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-database.js";

  // 🔹 Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDsC5GGUEWzBagQhiEgIet96fRyqElIgWw",
    authDomain: "anonymouschatters-86252.firebaseapp.com",
    databaseURL: "https://anonymouschatters-86252-default-rtdb.firebaseio.com",
    projectId: "anonymouschatters-86252",
    storageBucket: "anonymouschatters-86252.firebasestorage.app",
    messagingSenderId: "108101708489",
    appId: "1:108101708489:web:c564c231a80391409bfb18",
    measurementId: "G-KVWSMMZJ8C"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const chatRef = ref(db, "messages");

  const chatDiv = document.getElementById('chat');
  const messageInput = document.getElementById('message');
  const sendBtn = document.getElementById('sendBtn');

  let userName = localStorage.getItem('chatName');
  if (!userName) {
    userName = prompt("Vyber si přezdívku (bude si ji pamatovat prohlížeč):") || "Anonymous";
    localStorage.setItem('chatName', userName);
  }

  onChildAdded(chatRef, (snapshot) => {
    const data = snapshot.val();
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = `${data.name}: ${data.text}`;
    chatDiv.appendChild(msg);
    chatDiv.scrollTop = chatDiv.scrollHeight;
  });

  function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;
    push(chatRef, { name: userName, text });
    messageInput.value = '';
  }

  sendBtn.addEventListener('click', sendMessage);
  messageInput.addEventListener('keyup', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  // 🔹 Náhodná reklama
  const adText = document.getElementById('adText');
  const adImage = document.getElementById('adImage');
  const options = [
    { text: "Kupte si Uranijum!", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Uranium_disks.jpg/320px-Uranium_disks.jpg" },
    { text: "Kupte si Plutonium!", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Plutonium_spheres.jpg/320px-Plutonium_spheres.jpg" }
  ];

  const randomAd = options[Math.floor(Math.random() * options.length)];
  adText.textContent = randomAd.text;
  adImage.src = randomAd.img;

</script>

</body>
</html>
