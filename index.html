<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat + Pong Game</title>
<style>
body { font-family: 'Segoe UI', sans-serif; max-width: 600px; margin: 20px auto; transition: background 0.3s, color 0.3s; }
.light-mode { background: #f9f9f9; color: #222; }
.dark-mode { background: #121212; color: #eee; }
#chatContainer, #gameContainer { display: none; }
#chat { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
.msg { margin-bottom: 5px; }
#typingIndicator { font-style: italic; color: #555; height: 20px; margin-bottom: 5px; }
#message { width: 70%; padding: 8px; margin-bottom: 5px; border-radius: 5px; border: 1px solid #ccc; outline: none; }
button { padding: 7px 12px; border-radius: 5px; border: none; cursor: pointer; margin-bottom: 5px; }
#themeBtn { margin-bottom: 10px; }
#gameCanvas { border: 1px solid #555; background: #000; display:block; margin: 10px auto; touch-action: none; }
</style>
</head>
<body class="light-mode">

<h1>Chat + Pong Game</h1>
<button id="themeBtn">Toggle Dark/Light Mode</button>
<button id="chatBtn">Chat Mode</button>
<button id="gameBtn">Game Mode</button>

<div id="passwordContainer">
  <p>Please enter the password to join the chat/game. Hint: <em>jaky je jmeno tomáše?</em></p>
  <input type="password" id="passwordInput" placeholder="Password" />
  <button id="passwordBtn">Enter</button>
  <p id="passwordError" style="color:red; display:none;">Incorrect password!</p>
</div>

<div id="chatContainer">
  <div id="chat"></div>
  <div id="typingIndicator"></div>
  <input type="text" id="message" placeholder="Type a message..." />
  <button id="sendBtn">Send</button>
</div>

<div id="gameContainer">
  <canvas id="gameCanvas" width="400" height="300"></canvas>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDsC5GGUEWzBagQhiEgIet96fRyqElIgWw",
  authDomain: "anonymouschatters-86252.firebaseapp.com",
  databaseURL: "https://anonymouschatters-86252-default-rtdb.firebaseio.com",
  projectId: "anonymouschatters-86252",
  storageBucket: "anonymouschatters-86252.firebasestorage.app",
  messagingSenderId: "108101708489",
  appId: "1:108101708489:web:c564c231a80391409bfb18",
  measurementId: "G-KVWSMMZJ8C"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "messages");
const typingRef = ref(db, "typing");

const body = document.body;
const themeBtn = document.getElementById('themeBtn');
const chatBtn = document.getElementById('chatBtn');
const gameBtn = document.getElementById('gameBtn');
const passwordInput = document.getElementById('passwordInput');
const passwordBtn = document.getElementById('passwordBtn');
const passwordError = document.getElementById('passwordError');
const chatContainer = document.getElementById('chatContainer');
const passwordContainer = document.getElementById('passwordContainer');
const gameContainer = document.getElementById('gameContainer');
const chatDiv = document.getElementById('chat');
const typingIndicatorDiv = document.getElementById('typingIndicator');
const messageInput = document.getElementById('message');
const sendBtn = document.getElementById('sendBtn');
const gameCanvas = document.getElementById('gameCanvas');
const ctx = gameCanvas.getContext('2d');

themeBtn.addEventListener('click', ()=>{ body.classList.toggle('dark-mode'); body.classList.toggle('light-mode'); });
chatBtn.addEventListener('click', ()=>{ chatContainer.style.display='block'; gameContainer.style.display='none'; });
gameBtn.addEventListener('click', ()=>{ chatContainer.style.display='none'; gameContainer.style.display='block'; });

// PASSWORD HANDLING
function enterPassword(){
  const val = passwordInput.value.trim();
  if(val==='Halama'){
    localStorage.setItem('chatPassword', val);
    passwordContainer.style.display='none';
    chatContainer.style.display='block';
    initChat();
  } else {
    passwordError.style.display='block';
  }
}
passwordBtn.addEventListener('click', enterPassword);
passwordInput.addEventListener('keyup', e=>{ if(e.key==='Enter') enterPassword(); });

// Auto-check stored password
if(localStorage.getItem('chatPassword')==='Halama'){
  passwordContainer.style.display='none';
  chatContainer.style.display='block';
  initChat();
}

// CHAT FUNCTIONS
function initChat(){
  let userName = sessionStorage.getItem('chatName');
  if(!userName){ userName = prompt("Choose your chat name for this session:") || "Anonymous"; sessionStorage.setItem('chatName', userName); }

  onChildAdded(chatRef, snapshot=>{
    const data = snapshot.val();
    const msg = document.createElement('div');
    msg.className='msg';
    msg.textContent=`${data.name}: ${data.text}`;
    chatDiv.appendChild(msg);
    chatDiv.scrollTop = chatDiv.scrollHeight;
  });

  messageInput.addEventListener('input', ()=>{ set(typingRef,{name:userName,typing:messageInput.value.trim()!==''}); });
  onValue(typingRef, snapshot=>{
    const data = snapshot.val();
    if(data && data.name!==userName && data.typing) typingIndicatorDiv.textContent=`${data.name} is typing...`;
    else typingIndicatorDiv.textContent='';
  });

  function sendMessage(){ const t=messageInput.value.trim(); if(!t) return; push(chatRef,{name:userName,text:t}); messageInput.value=''; set(typingRef,{name:userName,typing:false}); }
  sendBtn.addEventListener('click',sendMessage);
  messageInput.addEventListener('keyup', e=>{ if(e.key==='Enter') sendMessage(); });
  window.addEventListener('beforeunload', ()=>{ set(typingRef,{name:userName,typing:false}); });

  initGame(userName);
}

// SIMPLE GAME PLACEHOLDER
function initGame(userName){
  ctx.fillStyle='white';
  ctx.font='20px Arial';
  ctx.textAlign='center';
  ctx.fillText('Pong Game Coming Soon!',200,150);
}

</script>
</body>
</html>
