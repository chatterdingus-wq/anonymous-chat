<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Chat Room</title>
<style>
body { font-family: Arial; max-width: 700px; margin: 20px auto; }
#chat { border:1px solid #ccc; height:400px; overflow-y:scroll; padding:10px; background:#f9f9f9; margin-bottom:10px; }
#message { width:60%; padding:5px; }
#imageInput { margin-left:5px; }
#imagePreview { max-width:200px; max-height:150px; display:block; margin:5px 0; }
button { padding:5px 10px; margin-left:5px; }
.msg { margin-bottom:10px; }
.msg img { max-width:100%; border-radius:5px; display:block; margin-top:5px; }
#login { text-align:center; margin-top:100px; }
#login input { padding:5px; margin:5px; }
</style>
</head>
<body>

<h1 style="text-align:center;">Anonymous Chat Room</h1>

<div id="login">
  <p>Password Required</p>
  <input type="password" id="passwordInput" placeholder="Enter password">
  <button onclick="checkPassword()">Enter</button>
  <p style="font-size:0.9em; color:gray;">Hint: jaky je Tomášovo přijmení</p>
  <p id="loginMessage" style="color:red;"></p>
</div>

<div id="chatContainer" style="display:none;">
  <div id="chat"></div>
  <input type="text" id="message" placeholder="Type a message...">
  <input type="file" id="imageInput" accept="image/*">
  <img id="imagePreview" src="" style="display:none;">
  <button onclick="sendMessage()">Send</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.3.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.3.0/firebase-database-compat.js"></script>

<script>
const correctPassword = "Halama";

function checkPassword() {
  const pwd = document.getElementById('passwordInput').value;
  const msg = document.getElementById('loginMessage');
  if (pwd === correctPassword) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('chatContainer').style.display = 'block';
    initChat();
  } else {
    msg.textContent = "Wrong password. Try again!";
  }
}

function initChat() {
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);

  const db = firebase.database();
  const chatRef = db.ref('messages');

  const chatDiv = document.getElementById('chat');
  const messageInput = document.getElementById('message');
  const imageInput = document.getElementById('imageInput');
  const imagePreview = document.getElementById('imagePreview');

  let userName = localStorage.getItem('chatName') || prompt("Choose your chat name:") || "Anonymous";
  localStorage.setItem('chatName', userName);

  imageInput.addEventListener('change', () => {
    if (imageInput.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        imagePreview.src = e.target.result;
        imagePreview.style.display = 'block';
      };
      reader.readAsDataURL(imageInput.files[0]);
    } else {
      imagePreview.style.display = 'none';
    }
  });

  chatRef.on('child_added', snapshot => {
    const data = snapshot.val();
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = `${data.name}: ${data.text || ""}`;
    if (data.imageData) {
      const img = document.createElement('img');
      img.src = data.imageData; // Base64 image
      msg.appendChild(img);
    }
    chatDiv.appendChild(msg);
    chatDiv.scrollTop = chatDiv.scrollHeight;
  });

  window.sendMessage = function() {
    const text = messageInput.value.trim();
    const file = imageInput.files[0];

    if (!text && !file) return alert("Type a message or select an image!");

    if (file) {
      const reader = new FileReader();
      reader.onload = e => {
        const imageData = e.target.result; // Base64 string
        chatRef.push({ name: userName, text, imageData });
        imagePreview.style.display = 'none';
        imageInput.value = '';
        messageInput.value = '';
      };
      reader.readAsDataURL(file);
    } else {
      chatRef.push({ name: userName, text });
      messageInput.value = '';
    }
  };

  messageInput.addEventListener('keyup', e => { if (e.key === 'Enter') sendMessage(); });
}
</script>

</body>
</html>
