<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Chat Room</title>
<style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding-bottom: 40px; }
    #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; background: #f9f9f9; margin-bottom: 10px; }
    #message { width: 70%; padding: 5px; margin-bottom: 5px; }
    button { padding: 5px 10px; margin-left: 5px; }
    .msg { margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
    .msg-text { flex: 1; }
    #wipeBtn { margin-top: 10px; background-color: #ff4d4d; color: white; border: none; cursor: pointer; }
    /* Footer */
    #footer { text-align: center; color: #555; font-size: 0.9em; position: fixed; bottom: 10px; width: 100%; }
</style>
</head>
<body>

<h1>Anonymous Chat Room</h1>
<div id="chat"></div>
<input type="text" id="message" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>
<br>
<button id="wipeBtn">🧹 Wipe All Chats</button>

<!-- Footer credit -->
<div id="footer">Vytvořil Tomáš Halama</div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.3.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.3.0/firebase-database-compat.js"></script>
<script>
  // 🔹 Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDsC5GGUEWzBagQhiEgIet96fRyqElIgWw",
    authDomain: "anonymouschatters-86252.firebaseapp.com",
    databaseURL: "https://anonymouschatters-86252-default-rtdb.firebaseio.com",
    projectId: "anonymouschatters-86252",
    storageBucket: "anonymouschatters-86252.firebasestorage.app",
    messagingSenderId: "108101708489",
    appId: "1:108101708489:web:c564c231a80391409bfb18",
    measurementId: "G-KVWSMMZJ8C"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const chatRef = db.ref('messages');

  const chatDiv = document.getElementById('chat');
  const messageInput = document.getElementById('message');
  const wipeBtn = document.getElementById('wipeBtn');

  // 🔹 One-time username
  let userName = localStorage.getItem('chatName');
  if (!userName) {
    userName = prompt("Choose your chat name (will be remembered on this browser):") || "Anonymous";
    localStorage.setItem('chatName', userName);
  }

  // 🔹 Listen for messages
  chatRef.on('child_added', (snapshot) => {
    const data = snapshot.val();
    const msg = document.createElement('div');
    msg.className = 'msg';

    const textDiv = document.createElement('div');
    textDiv.className = 'msg-text';
    textDiv.textContent = `${data.name}: ${data.text}`;

    const delButton = document.createElement('button');
    delButton.textContent = '🗑️';
    delButton.title = 'Delete for myself';
    delButton.onclick = () => msg.remove();

    msg.appendChild(textDiv);
    msg.appendChild(delButton);
    chatDiv.appendChild(msg);
    chatDiv.scrollTop = chatDiv.scrollHeight;
  });

  // 🔹 Send message
  function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;
    chatRef.push({ name: userName, text });
    messageInput.value = '';
  }

  messageInput.addEventListener('keyup', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  // 🔹 Wipe all chats for yourself
  wipeBtn.onclick = () => {
    chatDiv.innerHTML = '';
  };
</script>

</body>
</html>
