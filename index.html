<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Chat Room</title>
<style>
body { font-family: Arial; max-width: 700px; margin: 20px auto; }
#chat { border:1px solid #ccc; height:400px; overflow-y:scroll; padding:10px; background:#f9f9f9; margin-bottom:10px; }
#message { width:70%; padding:5px; }
button { padding:5px 10px; margin-left:5px; }
.msg { margin-bottom:10px; }
#login { text-align:center; margin-top:100px; }
#login input { padding:5px; margin:5px; }
</style>
</head>
<body>

<h1 style="text-align:center;">Anonymous Chat Room</h1>

<div id="login">
  <p>Password Required</p>
  <input type="password" id="passwordInput" placeholder="Enter password">
  <button onclick="checkPassword()">Enter</button>
  <p style="font-size:0.9em; color:gray;">Hint: jaky je Tomášovo přijmení</p>
  <p id="loginMessage" style="color:red;"></p>
</div>

<div id="chatContainer" style="display:none;">
  <div id="chat"></div>
  <input type="text" id="message" placeholder="Type a message...">
  <button onclick="sendMessage()">Send</button>
</div>

<!-- Firebase v9+ CDN -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-database.js";

// Your Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDsC5GGUEWzBagQhiEgIet96fRyqElIgWw",
  authDomain: "anonymouschatters-86252.firebaseapp.com",
  databaseURL: "https://anonymouschatters-86252-default-rtdb.firebaseio.com",
  projectId: "anonymouschatters-86252",
  storageBucket: "anonymouschatters-86252.firebasestorage.app",
  messagingSenderId: "108101708489",
  appId: "1:108101708489:web:c564c231a80391409bfb18",
  measurementId: "G-KVWSMMZJ8C"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const correctPassword = "Halama";

// Password check
function checkPassword() {
  const pwd = document.getElementById('passwordInput').value;
  const msg = document.getElementById('loginMessage');
  if (pwd === correctPassword) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('chatContainer').style.display = 'block';
    initChat();
  } else {
    msg.textContent = "Wrong password. Try again!";
  }
}

function initChat() {
  const chatDiv = document.getElementById('chat');
  const messageInput = document.getElementById('message');

  // Ask for username
  let userName = localStorage.getItem('chatName') || prompt("Choose your chat name:") || "Anonymous";
  localStorage.setItem('chatName', userName);

  // Request notification permission
  if ("Notification" in window && Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  const chatRef = ref(db, 'messages');

  // Listen for new messages
  onChildAdded(chatRef, (snapshot) => {
    const data = snapshot.val();
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = `${data.name}: ${data.text}`;
    chatDiv.appendChild(msg);
    chatDiv.scrollTop = chatDiv.scrollHeight;

    // Vibrate device
    if (navigator.vibrate) {
      navigator.vibrate(200);
    }

    // Show notification if it's not your own message
    if (data.name !== userName && Notification.permission === "granted") {
      new Notification(`${data.name} says:`, { body: data.text });
    }
  });

  // Send message
  window.sendMessage = function() {
    const text = messageInput.value.trim();
    if (!text) return;
    push(chatRef, { name: userName, text });
    messageInput.value = '';
  };

  // Send on Enter key
  messageInput.addEventListener('keyup', e => { if (e.key === 'Enter') sendMessage(); });
}
</script>

</body>
</html>
