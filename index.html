<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant Anonymous Chat with Typing Indicator</title>
<style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; }
    #chatContainer { display: none; }
    #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; background: #f9f9f9; margin-bottom: 10px; }
    #message { width: 70%; padding: 5px; margin-bottom: 5px; }
    button { padding: 5px 10px; }
    .msg { margin-bottom: 5px; }
    #typingIndicator { font-style: italic; color: #555; height: 18px; margin-bottom: 5px; }
</style>
</head>
<body>

<h1>Anonymous Chat Room</h1>

<div id="passwordContainer">
  <p>Please enter the password to join the chat. Hint: <em>jaky je jmeno tomáše?</em></p>
  <input type="password" id="passwordInput" placeholder="Password" />
  <button id="passwordBtn">Enter</button>
  <p id="passwordError" style="color:red; display:none;">Incorrect password!</p>
</div>

<div id="chatContainer">
  <div id="chat"></div>
  <div id="typingIndicator"></div>
  <input type="text" id="message" placeholder="Type a message..." />
  <button id="sendBtn">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-database.js";

// 🔹 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDsC5GGUEWzBagQhiEgIet96fRyqElIgWw",
  authDomain: "anonymouschatters-86252.firebaseapp.com",
  databaseURL: "https://anonymouschatters-86252-default-rtdb.firebaseio.com",
  projectId: "anonymouschatters-86252",
  storageBucket: "anonymouschatters-86252.firebasestorage.app",
  messagingSenderId: "108101708489",
  appId: "1:108101708489:web:c564c231a80391409bfb18",
  measurementId: "G-KVWSMMZJ8C"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "messages");
const typingRef = ref(db, "typing");

const passwordInput = document.getElementById('passwordInput');
const passwordBtn = document.getElementById('passwordBtn');
const passwordError = document.getElementById('passwordError');
const chatContainer = document.getElementById('chatContainer');
const passwordContainer = document.getElementById('passwordContainer');
const typingIndicatorDiv = document.getElementById('typingIndicator');

// Check if password was already entered
const storedPassword = localStorage.getItem('chatPassword');
if (storedPassword === 'Halama') {
  passwordContainer.style.display = 'none';
  chatContainer.style.display = 'block';
  initChat();
}

function initChat() {
  const chatDiv = document.getElementById('chat');
  const messageInput = document.getElementById('message');
  const sendBtn = document.getElementById('sendBtn');

  // Check if user already chose a name this session
  let userName = sessionStorage.getItem('chatName');
  if (!userName) {
    userName = prompt("Choose your chat name for this session:") || "Anonymous";
    sessionStorage.setItem('chatName', userName);
  }

  // Listen for new messages
  onChildAdded(chatRef, (snapshot) => {
    const data = snapshot.val();
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = `${data.name}: ${data.text}`;
    chatDiv.appendChild(msg);
    chatDiv.scrollTop = chatDiv.scrollHeight;
  });

  // Typing indicator logic
  messageInput.addEventListener('input', () => {
    set(typingRef, { name: userName, typing: messageInput.value.trim() !== '' });
  });

  // Listen for others typing
  onValue(typingRef, (snapshot) => {
    const data = snapshot.val();
    if (data && data.name !== userName && data.typing) {
      typingIndicatorDiv.textContent = `${data.name} is typing...`;
    } else {
      typingIndicatorDiv.textContent = '';
    }
  });

  // Send message
  function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;
    push(chatRef, { name: userName, text });
    messageInput.value = '';
    set(typingRef, { name: userName, typing: false }); // reset typing indicator
  }

  sendBtn.addEventListener('click', sendMessage);
  messageInput.addEventListener('keyup', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  // Clear typing on page unload
  window.addEventListener('beforeunload', () => {
    set(typingRef, { name: userName, typing: false });
  });
}

function checkPassword() {
  const entered = passwordInput.value.trim();
  if (entered === 'Halama') {
    localStorage.setItem('chatPassword', entered); // remember password permanently
    passwordContainer.style.display = 'none';
    chatContainer.style.display = 'block';
    initChat();
  } else {
    passwordError.style.display = 'block';
  }
}

passwordBtn.addEventListener('click', checkPassword);
passwordInput.addEventListener('keyup', (e) => {
  if (e.key === 'Enter') checkPassword();
});
</script>

</body>
</html>
